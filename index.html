<!doctype html>
<!-- data-theme 直接寫死預設：store 載入是 async，避免首幀無主題的閃爍 -->
<html lang="zh-Hant" data-theme="vol-de-nuit">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Plume</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- 兩主題字體一次載：離線時 fallback 系統字，功能不受影響 -->
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,400;0,500;0,700;1,400&family=Literata:ital,opsz,wght@0,7..72,400;0,7..72,600;0,7..72,700;1,7..72,400&family=Noto+Serif+TC:wght@400;600;700&family=Space+Mono:wght@400;700&family=Martian+Mono:wght@400;500;700&family=Noto+Sans+TC:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/src/style.css" />
    <script type="module" src="/src/main.ts" defer></script>
  </head>

  <body data-mode="read">
    <header id="toolbar">
      <button id="btn-new" type="button" class="edit-only" aria-label="新增檔案" title="新增檔案" data-i18n-aria-label="ui.newDesc" data-i18n-title="ui.newDesc" data-i18n-tooltip="ui.newDesc" data-tooltip="新增檔案">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon-toolbar" aria-hidden="true">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
          <polyline points="14 2 14 8 20 8"></polyline>
          <line x1="12" y1="11" x2="12" y2="17"></line>
          <line x1="9" y1="14" x2="15" y2="14"></line>
        </svg>
      </button>
      <button id="btn-open" type="button" aria-label="開啟檔案" title="開啟檔案" data-i18n-aria-label="ui.openDesc" data-i18n-title="ui.openDesc" data-i18n-tooltip="ui.openDesc" data-tooltip="開啟檔案">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon-toolbar" aria-hidden="true">
          <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path>
          <line x1="12" y1="11" x2="12" y2="17"></line>
          <line x1="9" y1="14" x2="15" y2="14"></line>
        </svg>
      </button>
      <button id="btn-codex" type="button" aria-label="冊：資料夾檔案樹" title="冊：資料夾檔案樹" data-i18n-aria-label="ui.codexDesc" data-i18n-title="ui.codexDesc" data-i18n-tooltip="ui.codexDesc" data-tooltip="冊：資料夾檔案樹">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon-toolbar" aria-hidden="true">
          <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path>
          <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path>
        </svg>
      </button>
      <button id="btn-save" type="button" class="edit-only" aria-label="儲存" title="儲存" data-i18n-aria-label="ui.saveDesc" data-i18n-title="ui.saveDesc" data-i18n-tooltip="ui.saveDesc" data-tooltip="儲存">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon-toolbar" aria-hidden="true">
          <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path>
          <polyline points="17 21 17 13 7 13 7 21"></polyline>
          <polyline points="7 3 7 8 15 8"></polyline>
        </svg>
      </button>
      <div class="dropdown" id="export-dropdown">
        <button id="btn-export" type="button" aria-haspopup="true" aria-expanded="false" aria-label="匯出選項" title="匯出選項" data-i18n-aria-label="ui.exportDesc" data-i18n-title="ui.exportDesc" data-i18n-tooltip="ui.exportDesc" data-tooltip="匯出選項">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon-toolbar" aria-hidden="true">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
            <polyline points="17 8 12 3 7 8"></polyline>
            <line x1="12" y1="3" x2="12" y2="15"></line>
          </svg>
        </button>
        <div class="dropdown-menu" aria-label="匯出選項" data-i18n-aria-label="ui.exportDesc">
          <button id="btn-export-html" type="button" data-i18n="ui.exportHtml">匯出 HTML</button>
          <button id="btn-export-pdf" type="button" data-i18n="ui.exportPdf">匯出 PDF</button>
        </div>
      </div>
      <button id="btn-fullscreen" type="button" class="read-only" aria-label="全螢幕" title="全螢幕" data-i18n-aria-label="ui.fullscreenDesc" data-i18n-title="ui.fullscreenDesc" data-i18n-tooltip="ui.fullscreenDesc" data-tooltip="全螢幕">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon-toolbar" aria-hidden="true">
          <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"></path>
        </svg>
      </button>
      <div id="mode-switch" role="group" aria-label="寫作模式" data-i18n-aria-label="ui.modeSwitchDesc">
        <button type="button" data-mode-target="write" aria-label="撰：沉浸寫作" title="撰：沉浸寫作" data-i18n-aria-label="ui.writeModeDesc" data-i18n-title="ui.writeModeDesc" data-i18n-tooltip="ui.writeModeDesc" data-tooltip="撰：沉浸寫作">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon-toolbar" aria-hidden="true">
            <path d="M12 20h9"></path>
            <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path>
          </svg>
        </button>
        <button type="button" data-mode-target="split" aria-label="參：邊寫邊對照" title="參：邊寫邊對照" data-i18n-aria-label="ui.splitModeDesc" data-i18n-title="ui.splitModeDesc" data-i18n-tooltip="ui.splitModeDesc" data-tooltip="參：邊寫邊對照">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon-toolbar" aria-hidden="true">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
            <line x1="12" y1="3" x2="12" y2="21"></line>
          </svg>
        </button>
        <button type="button" data-mode-target="read" aria-label="閱：閱讀" title="閱：閱讀" data-i18n-aria-label="ui.readModeDesc" data-i18n-title="ui.readModeDesc" data-i18n-tooltip="ui.readModeDesc" data-tooltip="閱：閱讀">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon-toolbar" aria-hidden="true">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
            <circle cx="12" cy="12" r="3"></circle>
          </svg>
        </button>
      </div>
      <select id="recent-list" aria-label="最近檔案" title="最近檔案" data-i18n-aria-label="ui.recentFiles" data-i18n-title="ui.recentFiles">
        <option value="" selected disabled data-i18n="ui.recentFiles">最近檔案</option>
      </select>
      <button id="btn-settings" type="button" aria-label="設定" title="設定" data-i18n-aria-label="ui.settings" data-i18n-title="ui.settings" data-i18n-tooltip="ui.settings" data-tooltip="設定">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon-gear" aria-hidden="true">
          <circle cx="12" cy="12" r="3"></circle>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
        </svg>
      </button>
    </header>

    <div id="tabs-container">
      <div id="tabs-list"></div>
    </div>

    <button id="btn-exit-fullscreen" type="button" aria-label="退出全螢幕" data-i18n-aria-label="ui.exitFullscreen">✕</button>
    <main>
      <aside id="codex">
        <div class="codex-header">
          <select class="codex-switch" aria-label="切換冊" data-i18n-aria-label="ui.switchCodex"></select>
          <button class="codex-add" type="button" aria-label="開啟冊資料夾" title="開啟冊資料夾" data-i18n-aria-label="ui.openCodexFolder" data-i18n-title="ui.openCodexFolder">+</button>
          <button class="codex-import" type="button" aria-label="匯入冊資料夾" title="匯入冊資料夾" data-i18n-aria-label="ui.importCodexFolder" data-i18n-title="ui.importCodexFolder">📥</button>
          <button class="codex-delete" type="button" aria-label="刪除冊" title="刪除冊" data-i18n-aria-label="ui.deleteCodex" data-i18n-title="ui.deleteCodex">🗑️</button>
        </div>
        <ul class="codex-tree"></ul>
      </aside>
      <aside id="toc"><ul></ul></aside>
      <div id="editor"></div>
      <div id="preview"></div>
      <!-- 夜航主題浮飾：郵務機（預覽右上）+ 守夜狐（編輯區右下）。
           pointer-events:none 不擋操作；硯墨主題不顯示（唯一彩色是硃砂的敘事） -->
      <div id="illos" aria-hidden="true">
        <img class="illo-biplane" src="/illos/biplane.webp" alt="" />
        <img class="illo-fox" src="/illos/fox.webp" alt="" />
      </div>
    </main>

    <footer id="statusbar">
      <div class="gauges">
        <!-- g-label 文字由 CSS 依主題切換：03 儀表縮寫 / 05 中文 -->
        <span class="gauge" aria-label="字數" data-i18n-aria-label="ui.chars"
          ><span class="g-label" data-vol="ALT" data-ink="字數" data-i18n-data-vol="ui.charsAlt" data-i18n-data-ink="ui.chars"></span
          ><span class="g-num" id="stat-chars">0</span><span class="g-unit" data-i18n="ui.charsUnit">字</span></span
        >
        <span class="ticks" aria-hidden="true"></span>
        <span class="gauge" aria-label="行數" data-i18n-aria-label="ui.lines"
          ><span class="g-label" data-vol="HDG" data-ink="行數" data-i18n-data-vol="ui.linesAlt" data-i18n-data-ink="ui.lines"></span
          ><span class="g-num" id="stat-lines">1</span><span class="g-unit" data-i18n="ui.linesUnit">行</span></span
        >
        <span class="ticks" aria-hidden="true"></span>
        <span class="gauge" aria-label="渲染時間" data-i18n-aria-label="ui.render"
          ><span class="g-label" data-vol="ETA" data-ink="渲染" data-i18n-data-vol="ui.renderAlt" data-i18n-data-ink="ui.render"></span
          ><span class="g-num" id="stat-ms">0</span><span class="g-unit" data-i18n="ui.msUnit">ms</span></span
        >
      </div>

      <div id="dirty-indicator" class="saved" aria-live="polite">
        <!-- 03 Vol de Nuit：儀表指針（dirty 時指針下垂變金） -->
        <svg class="save-dial" viewBox="0 0 28 28" width="24" height="24" aria-hidden="true">
          <circle cx="14" cy="14" r="11.5" class="dial-face" />
          <line x1="3.5" y1="14" x2="6" y2="14" class="dial-tick" />
          <line x1="14" y1="3.5" x2="14" y2="6" class="dial-tick" />
          <line x1="21.4" y1="6.6" x2="19.7" y2="8.3" class="dial-tick-gold" />
          <g class="needle">
            <line x1="14" y1="14" x2="19" y2="9" class="needle-line" />
          </g>
          <circle cx="14" cy="14" r="1.6" class="dial-hub" />
        </svg>
        <!-- 05 Inkstone：硃砂印（dirty 時實印「未存」，儲存後淡去） -->
        <svg class="seal" viewBox="0 0 30 30" width="22" height="22" aria-hidden="true">
          <rect x="1.5" y="1.5" width="27" height="27" rx="3" class="seal-frame" />
          <text x="15" y="20.5" text-anchor="middle" class="seal-text" data-i18n="ui.unsavedSeal">未存</text>
        </svg>
        <span class="save-text" id="save-text" data-i18n="ui.saved">已儲存</span>
      </div>
    </footer>

    <div id="settings-overlay" class="settings-overlay" hidden>
      <div class="settings-card" role="dialog" aria-modal="true" aria-labelledby="settings-title">
        <div class="settings-header">
          <h2 id="settings-title" data-i18n="ui.settings">設定</h2>
          <button id="btn-close-settings" type="button" class="settings-close-btn" aria-label="關閉" data-i18n-aria-label="ui.close" title="關閉" data-i18n-title="ui.close">✕</button>
        </div>
        <div class="settings-body">
          <div class="settings-row">
            <label for="theme-list" class="settings-label" data-i18n="ui.design">設計</label>
            <div class="settings-theme-group">
              <select id="theme-list" aria-label="設計" data-i18n-aria-label="ui.design">
                <option value="vol-de-nuit" data-i18n="menu.themeVolDeNuit">暗夜飛行</option>
                <option value="inkstone" data-i18n="menu.themeInkstone">硯台</option>
                <option value="auto" data-i18n="menu.themeAuto">自動</option>
              </select>
              <button id="btn-open-themes" type="button" class="settings-btn-secondary" title="開啟佈景主題資料夾" data-i18n-title="ui.openThemesFolder" data-i18n="ui.openThemesFolder">📂 主題目錄</button>
            </div>
          </div>
          <div class="settings-row">
            <label for="lang-list" class="settings-label" data-i18n="ui.language">語言</label>
            <select id="lang-list" aria-label="語言" data-i18n-aria-label="ui.language">
              <option value="" selected disabled data-i18n="ui.language">語言</option>
            </select>
          </div>
          <div class="settings-row">
            <span class="settings-label" data-i18n="ui.version">版本</span>
            <div class="settings-version-group">
              <span id="app-version" class="settings-value">v0.11.0</span>
              <button id="btn-check-update" type="button" class="settings-btn-secondary" data-i18n="ui.checkUpdate">檢查更新</button>
            </div>
          </div>
          <div id="update-status" class="settings-update-status" hidden></div>
        </div>
      </div>
    </div>
  </body>
</html>
