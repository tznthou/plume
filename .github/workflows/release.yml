# 打 tag（v*）觸發三平台打包，產物上傳到 GitHub Release。三平台 build 全綠後 publish job 自動轉正式發布（任一平台失敗則留 draft）。
# 簽章現況：macOS ad-hoc / Windows 未簽——自用與小範圍分發 OK，
# 安裝時 macOS 需右鍵開啟（或 xattr -dc）、Windows 會見 SmartScreen 提示。
name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  # 供應鏈守門（OWASP 2025 A03）：掃 src-tauri/Cargo.lock 的已知 advisory。
  # 獨立 job、不塞進三平台 matrix（Rust 依賴跨平台一致，跑一次即可）。
  # 刻意不被 build 的 needs 依賴：audit 紅燈是可見信號，但不硬擋 draft release 產出。
  audit:
    name: Cargo audit (supply chain)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      # cargo install 需編譯（約 2-3 分鐘）；release 不頻繁可接受，嫌慢可改用 prebuilt binary。
      - run: cargo install cargo-audit --locked
      - run: cargo audit
        working-directory: src-tauri

  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest # Apple Silicon
            args: --target aarch64-apple-darwin
            rust-targets: aarch64-apple-darwin
          - platform: macos-latest # Intel（cross-compile）
            args: --target x86_64-apple-darwin
            rust-targets: x86_64-apple-darwin
          - platform: windows-latest # Windows x64（NSIS）
            args: ""
            rust-targets: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: npm ci

      - run: npm run test

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VITE_APP_VERSION: ${{ github.ref_name }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Plume ${{ github.ref_name }}"
          releaseDraft: true
          args: ${{ matrix.args }}

  # 三平台 build 全數成功後自動把 draft 轉為正式發布。needs: build 確保產物齊全才公開，
  # 避免單純關掉 draft 時，第一個完成的平台搶先公開、其餘平台檔案還沒上傳的空窗。
  # 任一平台 build 失敗則此 job 不執行，release 留在 draft（安全）。
  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Un-draft release once all platforms are uploaded
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit "${{ github.ref_name }}" --draft=false --repo "${{ github.repository }}"
